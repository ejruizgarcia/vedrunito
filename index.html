            { 
                nombre: "Restaurante Rincón de Pepe Valero", direccion: "Calle Real 101 San Fernando Cádiz", categoria: "Restaurante", ciudad: "San Fernando", imagen: "https://raw.githubusercontent.com/ejruizgarcia/images/main/vedrunito14.png", lat: 36.4647385, lng: -6.1973995,
                descripcion: "Denominado La Flor de la Canela, este postre evoca un jardín comestible envuelto en humo de canela. Incluye un cannoli de harina de almendra y maíz morado, melaza de higo y perlas de leche de almendras que estallan en el paladar."
            },
            { 
                nombre: "Restaurante Esencias del Mar", direccion: "Cc Bahía Sur, Caño Herrera s/n, 11100 San Fernando", categoria: "Restaurante", ciudad: "San Fernando", imagen: "https://raw.githubusercontent.com/ejruizgarcia/images/main/vedrunito5.png", lat: 36.4726848, lng: -6.2094855,
                descripcion: "El postre Alma de Vedrunita con almendras es un viaje a la repostería de clausura de las Hermanas Clarisas de Antequera. Combina un bizcocho tierno con mermelada de albaricoque, cabello de ángel y una masa artesanal de almendras, canela y limón."
            },
            { 
                nombre: "Restaurante Montjuic", direccion: "C/ Colón, 55, 11100 San Fernando", categoria: "Restaurante", ciudad: "San Fernando", imagen: "https://raw.githubusercontent.com/ejruizgarcia/images/main/vedrunito7.png", lat: 36.4693028, lng: -6.198467,
                descripcion: "Este Canelón Dulce con Crocanti de Almendra fusiona un formato icónico con la tradición de la mousse de turrón de Jijona. Envuelto en una masa artesanal aromatizada con canela y bañado en natillas y dulce de leche, ofrece un festín de texturas dulces y crujientes."
            },
            { 
                nombre: "Restaurante Reyes Católicos", direccion: "Avda. Reyes Católicos s/n, 11100 San Fernando", categoria: "Restaurante", ciudad: "San Fernando", lat: 36.4694408, lng: -6.1993468, imagen: "https://raw.githubusercontent.com/ejruizgarcia/images/main/vedrunito21.png",
                descripcion: "Inspirada en la pureza de Santa Joaquina, esta tarta de queso destaca por su relleno blanco de crema suave y equilibrada. La almendra natural tostada y el sirope de frambuesas caramelizadas aportan profundidad de sabor y un contraste fresco y crujiente."
            },
            { 
                nombre: "Restaurante Salinas de Chiclana", direccion: "Salina Santa María De Jesús, Camino De, 11130 Chiclana", categoria: "Restaurante", ciudad: "Chiclana", lat: 36.4392892, lng: -6.1645317, imagen: "https://raw.githubusercontent.com/ejruizgarcia/images/main/vedrunito30.png",
                descripcion: "Bajo el nombre Veracha, esta pieza rinde tributo al paisaje salinero imitando las montañas de sal de las marismas. Una pirámide de chocolate blanco que oculta un relleno audaz de almendras locales, camarones deshidratados y flor de sal para una experiencia umami única."
            },
            { 
                nombre: "Trattoria Pizzería Nello's", direccion: "Calle San Federico 52, 11100 San Fernando", categoria: "Restaurante", ciudad: "San Fernando", imagen: "https://raw.githubusercontent.com/ejruizgarcia/images/main/vedrunito2.png", lat: 36.4761616, lng: -6.1983061,
                descripcion: "Una propuesta inspirada en la tradición de la Isla de Capri que celebra la unión del chocolate fondant con la almendra. El postre integra diversas texturas de almendra en una pasta de chocolate, coronada con láminas crujientes y un delicado espolvoreado de azúcar glas."
            }
        ];

        const grupoRestaurantes = L.layerGroup().addTo(map);
        const grupoPastelerias = L.layerGroup().addTo(map);

        window.compartirLocal = async function(index, btnElement) {
            const est = establecimientos[index];
            const imagenUrl = est.imagen || "https://raw.githubusercontent.com/ejruizgarcia/images/main/vedrunito1.png";
            const textoMensaje = `¿Has probado el "vedrunito" de ${est.nombre}? Ven a probarlo antes del 10 de mayo! #IIRutaDelDulceVedruna`;
            
            const originalHTML = btnElement.innerHTML;
            btnElement.style.opacity = '0.5';

            try {
                // Descargamos la imagen internamente para compartirla como archivo físico
                const response = await fetch(imagenUrl);
                const blob = await response.blob();
                const file = new File([blob], 'vedrunito.png', { type: blob.type });

                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    // Compartir la imagen física y el texto
                    await navigator.share({
                        text: textoMensaje,
                        files: [file]
                    });
                    btnElement.style.opacity = '1';
                } else if (navigator.share) {
                    // Respaldo de seguridad si el dispositivo antiguo no admite archivos
                    await navigator.share({
                        title: 'II Ruta del Dulce Vedruna',
                        text: textoMensaje,
                        url: imagenUrl
                    });
                    btnElement.style.opacity = '1';
                } else {
                    throw new Error('API de compartir no soportada');
                }
            } catch (err) {
                btnElement.style.opacity = '1';
                
                // Si el usuario simplemente canceló la ventana de compartir, no hacemos nada más
                if (err.name === 'AbortError') return;

                console.log('Uso de portapapeles alternativo:', err);
                const tempInput = document.createElement("textarea");
                tempInput.value = textoMensaje + " " + imagenUrl;
                document.body.appendChild(tempInput);
                tempInput.select();
                document.execCommand("copy");
                document.body.removeChild(tempInput);
                
                btnElement.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9abf38" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';
                setTimeout(() => { btnElement.innerHTML = originalHTML; }, 2000);
            }
        };

        function crearMarcadores() {
            grupoRestaurantes.clearLayers();
            grupoPastelerias.clearLayers();

            establecimientos.forEach((est, index) => {
                let esRestaurante = est.categoria.toLowerCase().includes('restaurante');
                let iconClass = esRestaurante ? 'dot-restaurante' : 'dot-pasteleria';
                
                let icon = L.divIcon({
                    className: `dot-marker ${iconClass}`,
                    iconSize: [16, 16],
                    iconAnchor: [8, 8]
                });

                let marker = L.marker([est.lat, est.lng], {
                    icon: icon,
                    draggable: false
                }).addTo(esRestaurante ? grupoRestaurantes : grupoPastelerias);

                est.marker = marker;

                let imagenUrl = est.imagen || "https://raw.githubusercontent.com/ejruizgarcia/images/main/vedrunito1.png";
                marker.bindPopup(`
                    <div class="popup-content">
                        <img src="${imagenUrl}" alt="Imagen del local" class="popup-imagen">
                        <div class="popup-info">
                            <div class="cabecera-popup">
                                <h3>${est.nombre}</h3>
                                <button class="btn-compartir" onclick="compartirLocal(${index}, this)" title="Compartir este local">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
                                </button>
                            </div>
                            <p><strong>Dirección:</strong> ${est.direccion}</p>
                            <div class="popup-desc">${est.descripcion}</div>
                        </div>
                    </div>
                `, { 
                    className: esRestaurante ? 'popup-restaurante' : 'popup-pasteleria',
                    offset: [0, -2]
                });
            });
        }

        document.getElementById('toggle-restaurantes').addEventListener('change', (e) => {
            e.target.checked ? map.addLayer(grupoRestaurantes) : map.removeLayer(grupoRestaurantes);
        });

        document.getElementById('toggle-pastelerias').addEventListener('change', (e) => {
            e.target.checked ? map.addLayer(grupoPastelerias) : map.removeLayer(grupoPastelerias);
        });

        function renderizarLista() {
            const contenedor = document.getElementById('lista-establecimientos');
            contenedor.innerHTML = '';
            
            const textoBusqueda = document.getElementById('buscador-listado').value.toLowerCase();
            const mostrarSF = document.getElementById('filtro-sf').checked;
            const mostrarChiclana = document.getElementById('filtro-chiclana').checked;
            const mostrarRestListado = document.getElementById('filtro-listado-restaurantes').checked;
            const mostrarPastListado = document.getElementById('filtro-listado-pastelerias').checked;
            
            const ordenados = [...establecimientos].sort((a, b) => a.nombre.localeCompare(b.nombre));
            
            ordenados.forEach(est => {
                let esRestaurante = est.categoria.toLowerCase().includes('restaurante');
                let pasaBusqueda = est.nombre.toLowerCase().includes(textoBusqueda) || est.direccion.toLowerCase().includes(textoBusqueda);
                let pasaCiudad = (est.ciudad === "San Fernando" && mostrarSF) || (est.ciudad === "Chiclana" && mostrarChiclana);
                let pasaCat = (esRestaurante && mostrarRestListado) || (!esRestaurante && mostrarPastListado);

                if (pasaBusqueda && pasaCiudad && pasaCat) {
                    let div = document.createElement('div');
                    div.className = 'item-lista';
                    div.innerHTML = `<h4>${est.nombre}</h4><p>${est.direccion}</p>`;
                    div.onclick = () => {
                        document.getElementById('modal-fondo').style.display = 'none';
                        
                        document.getElementById('toggle-restaurantes').checked = true;
                        document.getElementById('toggle-pastelerias').checked = true;
                        document.getElementById('filtro-listado-restaurantes').checked = true;
                        document.getElementById('filtro-listado-pastelerias').checked = true;
                        map.addLayer(grupoRestaurantes);
                        map.addLayer(grupoPastelerias);

                        map.flyTo([est.lat, est.lng], 18);
                        setTimeout(() => est.marker.openPopup(), 500);
                    };
                    contenedor.appendChild(div);
                }
            });
        }

        document.getElementById('buscador-listado').addEventListener('input', renderizarLista);
        document.getElementById('filtro-sf').addEventListener('change', renderizarLista);
        document.getElementById('filtro-chiclana').addEventListener('change', renderizarLista);
        document.getElementById('filtro-listado-restaurantes').addEventListener('change', renderizarLista);
        document.getElementById('filtro-listado-pastelerias').addEventListener('change', renderizarLista);

        document.getElementById('btn-abrir-listado').onclick = () => {
            document.getElementById('modal-fondo').style.display = 'flex';
            document.getElementById('modal-titulo').innerText = 'Listado';
            document.getElementById('lista-establecimientos').style.display = 'block';
            document.querySelector('.modal-buscador-container').style.display = 'block';
            document.querySelector('.modal-filtros-container').style.display = 'flex';
            document.getElementById('buscador-listado').value = '';
            renderizarLista();
        };

        document.getElementById('btn-patrocinadores').onclick = () => {
            document.getElementById('modal-patrocinadores-fondo').style.display = 'flex';
        };

        document.getElementById('modal-fondo').onclick = (e) => {
            if (e.target === document.getElementById('modal-fondo')) {
                document.getElementById('modal-fondo').style.display = 'none';
            }
        };

        document.getElementById('modal-patrocinadores-fondo').onclick = (e) => {
            if (e.target === document.getElementById('modal-patrocinadores-fondo')) {
                document.getElementById('modal-patrocinadores-fondo').style.display = 'none';
            }
        };

        crearMarcadores();
    </script>
</body>
</html>
